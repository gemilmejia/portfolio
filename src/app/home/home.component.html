<!-- NAVBAR -->
<nav class="navbar custom-navbar">

  <div class="container navbar-container">

    <!-- BRAND -->
    <a class="navbar-brand" href="#">
      Gemil Mejia <br />
      <small>Software Developer</small>
    </a>

    <!-- HAMBURGER -->
    <button class="hamburger" (click)="toggleMenu()">
      <i class="fas fa-bars"></i>
    </button>

    <!-- DESKTOP LINKS -->
    <div class="navbar-links">
      <a (click)="scrollToSection('hero')">HOME</a>
      <a (click)="scrollToSection('about')">ABOUT</a>
      <a (click)="scrollToSection('projects')">PROJECTS</a>
      <a (click)="scrollToSection('design')">DESIGN</a>
      <a (click)="scrollToSection('contact')">CONTACT</a>
    </div>

    <!-- RIGHT ICONS -->
    <div class="navbar-right">
      <a href="https://instagram.com" target="_blank" class="social-icon">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="https://linkedin.com" target="_blank" class="social-icon">
        <i class="fab fa-linkedin"></i>
      </a>

      <button class="dark-mode-toggle" (click)="toggleDarkMode()">
        <i class="fas fa-moon"></i>
      </button>
    </div>

  </div>
</nav>

<!-- SIDEBAR -->
<div class="sidebar-overlay"
     [class.active]="menuOpen"
     (click)="closeMenu()"></div>

<div class="sidebar" [class.open]="menuOpen">

  <a (click)="scrollToSection('hero')">HOME</a>
  <a (click)="scrollToSection('about')">ABOUT</a>
  <a (click)="scrollToSection('projects')">PROJECTS</a>
  <a (click)="scrollToSection('design')">DESIGN</a>
  <a (click)="scrollToSection('contact')">CONTACT</a>

  <div class="sidebar-bottom">

    <a href="https://instagram.com" target="_blank">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://linkedin.com" target="_blank">
      <i class="fab fa-linkedin"></i>
    </a>

    <button class="dark-mode-toggle" (click)="toggleDarkMode()">
      <i class="fas fa-moon"></i>
    </button>

  </div>
</div>

<!-- PAGE -->
<app-hero></app-hero>
<app-about></app-about>
<app-projects></app-projects>
<app-design></app-design>
<app-contact></app-contact>

<!-- BACK TO TOP -->
<button class="back-to-top-btn" (click)="scrollToTop()">
  <i class="fas fa-arrow-up"></i>
</button>
