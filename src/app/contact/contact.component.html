<section id="contact" class="contact-section" aria-labelledby="contact-heading">
  <div class="container">
    <div class="contact-content">
      <h2 id="contact-heading" class="contact-title">Get In Touch</h2>
      <p class="contact-subtitle">Let's connect and start the conversation.</p>
      <p class="contact-description">
        Feel free to send me a message, and I'll get back to you as soon as
        possible.
      </p>

      <form
        #contactForm="ngForm"
        (ngSubmit)="onSubmit(contactForm)"
        class="contact-form"
      >
        <div class="form-group">
          <label for="name" class="form-label">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="contact.name"
            required
            #name="ngModel"
            class="form-input"
            placeholder="Your full name"
          />
          <div *ngIf="name.invalid && name.touched" class="error-message">
            Name is required.
          </div>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="contact.email"
            required
            email
            #email="ngModel"
            class="form-input"
            placeholder="your.email@example.com"
          />
          <div *ngIf="email.invalid && email.touched" class="error-message">
            <span *ngIf="email.errors?.['required']">Email is required.</span>
            <span *ngIf="email.errors?.['email']"
              >Please enter a valid email address.</span
            >
          </div>
        </div>

        <div class="form-group">
          <label for="subject" class="form-label">Subject</label>
          <input
            type="text"
            id="subject"
            name="subject"
            [(ngModel)]="contact.subject"
            required
            #subject="ngModel"
            class="form-input"
            placeholder="What's this about?"
          />
          <div *ngIf="subject.invalid && subject.touched" class="error-message">
            Subject is required.
          </div>
        </div>

        <div class="form-group">
          <label for="message" class="form-label">Message</label>
          <textarea
            id="message"
            name="message"
            [(ngModel)]="contact.message"
            required
            #message="ngModel"
            class="form-textarea"
            placeholder="Your message here..."
            rows="5"
          ></textarea>
          <div *ngIf="message.invalid && message.touched" class="error-message">
            Message is required.
          </div>
        </div>

        <button
          type="submit"
          [disabled]="contactForm.invalid"
          class="contact-submit-btn"
        >
          <i class="fas fa-paper-plane" aria-hidden="true"></i>
          Send Message
        </button>
      </form>
    </div>
  </div>
</section>
