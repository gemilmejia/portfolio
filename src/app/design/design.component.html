<section id="design" class="design-section">
  <div class="container">
    <h1>Design Work</h1>
    <p>
      Explore selected visual design pieces created for web interfaces, brand
      concepts, and digital experiences.
    </p>
    <div class="design-grid">
      <article class="design-card" *ngFor="let item of designItems">
        <figure class="design-image">
          <img [src]="item.image" [alt]="item.alt" loading="lazy" decoding="async" />
          <button
            type="button"
            class="zoom-button"
            (click)="openPreview(item)"
            [attr.aria-label]="'Zoom ' + item.title"
          >
            <span aria-hidden="true">🔍</span>
            <span>Zoom</span>
          </button>
          <figcaption class="design-overlay">{{ item.overlay }}</figcaption>
        </figure>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </article>
    </div>
  </div>

  <!-- Fullscreen image preview for the selected design work -->
  <div
    class="preview-modal"
    *ngIf="isPreviewOpen"
    [class.is-open]="isPreviewOpen"
    role="dialog"
    aria-modal="true"
    aria-label="Image preview"
    (click)="closePreview()"
  >
    <div class="preview-modal__content" (click)="$event.stopPropagation()">
      <button
        type="button"
        class="preview-modal__close"
        (click)="closePreview()"
        aria-label="Close preview"
      >
        ×
      </button>

      <img
        *ngIf="selectedItem"
        [src]="selectedItem.image"
        [alt]="selectedItem.alt"
        class="preview-modal__image"
      />
    </div>
  </div>
</section>
