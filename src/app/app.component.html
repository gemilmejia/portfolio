<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemil</title>

  <!-- Font Awesome CDN (fixed) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

  <!-- Custom Styles -->
  <style>
    /* Reset */
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      transition: background 0.3s, color 0.3s;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    .navbar a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .navbar a.active {
      border-bottom: 2px solid #007bff;
    }

    .navbar-right {
      display: flex;
      align-items: center;
    }

    .social-icon {
      margin: 0 8px;
      color: #333;
      font-size: 18px;
      transition: color 0.3s;
    }

    .social-icon:hover {
      color: #007bff;
    }

    .dark-mode-toggle {
      margin-left: 15px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #333;
    }

    /* Dark Mode */
    .dark-mode {
      background: #121212;
      color: #f1f1f1;
    }

    .dark-mode .navbar {
      background: #1e1e1e;
      border-bottom: 1px solid #444;
    }

    .dark-mode .navbar a {
      color: #f1f1f1;
    }

    .dark-mode .social-icon,
    .dark-mode .dark-mode-toggle {
      color: #f1f1f1;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <!-- Brand -->
    <div class="navbar-brand-container">
      <a class="navbar-brand" href="#">Gemil Mejia</a>
      <br>&nbsp;&nbsp;<span>Software - Developer</span>
    </div>

    <!-- Center Links -->
    <div class="navbar-links">
      <a routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">HOME</a>
      <a routerLink="about" routerLinkActive="active">ABOUT</a>
      <a routerLink="projects" routerLinkActive="active">PROJECTS</a>
      <a routerLink="contact" routerLinkActive="active">CONTACT</a>
    </div>

    <!-- Right Side -->
    <div class="navbar-right">
      <a href="https://instagram.com" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
      <a href="https://twitter.com" target="_blank" class="social-icon"><i class="fab fa-twitter"></i></a>
      <a href="https://linkedin.com" target="_blank" class="social-icon"><i class="fab fa-linkedin"></i></a>

      <!-- Dark Mode Button -->
      <button id="darkModeToggle" class="dark-mode-toggle">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </nav>

  <!-- Angular Router Outlet -->
  <router-outlet></router-outlet>

  <!-- Dark Mode Script -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const darkModeToggle = document.getElementById("darkModeToggle");
      const icon = darkModeToggle.querySelector("i");

      // Load preference
      if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
        icon.classList.replace("fa-moon", "fa-sun");
      }

      // Toggle Dark Mode
      darkModeToggle.addEventListener("click", function () {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
          localStorage.setItem("darkMode", "enabled");
          icon.classList.replace("fa-moon", "fa-sun");
        } else {
          localStorage.setItem("darkMode", "disabled");
          icon.classList.replace("fa-sun", "fa-moon");
        }
      });
    });
  </script>
</body>
</html>
